name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
    strategy:
      max-parallel: 1
      matrix:
        node-version: ['20.x', '22.x', '24.x']

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Setup
        run: make setup

      - name: Fail fast for fork PRs (secrets unavailable)
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        run: |
          echo "Fork PR checks requiring secrets cannot run. Reach out to support@scalekit.com to get your PR reviewed with checks."
          exit 1

      - name: Verify generated code is up to date
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -z "$PAT_TOKEN" ]; then
            echo "PAT_TOKEN is required to run generate consistency checks."
            exit 1
          fi

          auth_header="$(printf "x-access-token:%s" "$PAT_TOKEN" | base64 | tr -d '\n')"

          cleanup() {
            git config --global --unset-all http.https://github.com/.extraheader || true
          }
          trap cleanup EXIT

          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic ${auth_header}"

          make verify-generate

      - name: Prettier
        run: npm run prettier

      - name: Lint
        run: make lint

      - name: Test
        if: matrix.node-version == '20.x'
        env:
          SCALEKIT_ENVIRONMENT_URL: ${{ secrets.SCALEKIT_ENVIRONMENT_URL }}
          SCALEKIT_CLIENT_ID: ${{ secrets.SCALEKIT_CLIENT_ID }}
          SCALEKIT_CLIENT_SECRET: ${{ secrets.SCALEKIT_CLIENT_SECRET }}
        run: make test
