name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # Required for npm provenance (OIDC)

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify no uncommitted build artifacts
        run: |
          git diff --exit-code lib/
          untracked="$(git ls-files --others --exclude-standard lib/)"
          if [ -n "$untracked" ]; then
            echo "Untracked built files detected — commit the build output before releasing:"
            echo "$untracked"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --tag latest --access public --provenance
